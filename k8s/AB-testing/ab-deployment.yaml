apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      version: A
  template:
    metadata:
      labels:
        app: aceest
        version: A
    spec:
      containers:
      - name: aceest
        image: prabakaran2311/aceest-app:v3.2.4
        ports:
        - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      version: B
  template:
    metadata:
      labels:
        app: aceest
        version: B
    spec:
      containers:
      - name: aceest
        image: prabakaran2311/aceest-app:latest
        ports:
        - containerPort: 5000