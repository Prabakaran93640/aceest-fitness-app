apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-app
  template:
    metadata:
      labels:
        app: aceest-app
    spec:
      containers:
      - name: aceest-app
        image: prabakaran2311/aceest-app:v3.2.4
        ports:
        - containerPort: 5000